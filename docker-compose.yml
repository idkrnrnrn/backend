services:
  hr-core:
    build:
      context: .
      dockerfile: services/hr-core/Dockerfile
    environment:
      HR_DATABASE_URL: postgresql+psycopg://postgres:postgres@postgres:5432/hr
      HR_LLM_BASE_URL: http://llm-screening:8001
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      llm-screening:
        condition: service_started

  llm-screening:
    build:
      context: .
      dockerfile: services/llm-screening/Dockerfile
    ports:
      - "8001:8001"

  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: hr
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d hr"]
      interval: 5s
      timeout: 3s
      retries: 20
