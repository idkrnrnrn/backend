services:
  hr-core:
    build:
      context: .
      dockerfile: services/hr-core/Dockerfile
    environment:
      HR_DATABASE_URL: postgresql://postgres:postgres@postgres:5432/hr
      HR_LLM_BASE_URL: http://host.docker.internal:3000
      HR_INVITE_CODE: HR-INVITE-2026
      HR_JWT_SECRET: local-dev-secret
      HR_COOKIE_SECURE: "false"
      PORT: "8000"
    ports:
      - "8888:8000"
    depends_on:
      postgres:
        condition: service_healthy
    extra_hosts:
      - "host.docker.internal:host-gateway"

  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: hr
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - hr-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d hr"]
      interval: 5s
      timeout: 3s
      retries: 20

volumes:
  hr-postgres-data:
